name: Install Invidious

on:
  push:
    branches:
      - master
  workflow_dispatch:  # Allow manual trigger

jobs:
  update:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v5
      
      - name: Install Invidious
        run: bash invidious_update.sh --install-invidious
